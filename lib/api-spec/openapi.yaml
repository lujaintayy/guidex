openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Infrastructure Copilot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: organizations
    description: Organization management
  - name: users
    description: User management
  - name: servers
    description: Server inventory
  - name: server-groups
    description: Server group management
  - name: deployments
    description: Deployment operations
  - name: templates
    description: Installation templates
  - name: ai
    description: AI assistant
  - name: monitoring
    description: Server monitoring
  - name: audit-logs
    description: Audit log operations
  - name: documentation
    description: Documentation generation and management
  - name: reports
    description: Report generation
  - name: notifications
    description: User notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/me/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeInput"
      responses:
        "200":
          description: Password changed

  # ─── ORGANIZATIONS ───────────────────────────────────────────────────────────
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List organizations for current user
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{orgId}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      summary: Delete organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations/{orgId}/stats:
    get:
      operationId: getOrganizationStats
      tags: [organizations]
      summary: Get organization overview stats
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgStats"

  /organizations/{orgId}/members:
    get:
      operationId: listOrgMembers
      tags: [organizations]
      summary: List organization members
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgMember"
    post:
      operationId: addOrgMember
      tags: [organizations]
      summary: Add member to organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgMemberInput"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMember"

  /organizations/{orgId}/members/{userId}:
    patch:
      operationId: updateOrgMember
      tags: [organizations]
      summary: Update member role
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMember"
    delete:
      operationId: removeOrgMember
      tags: [organizations]
      summary: Remove member from organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ─── SERVERS ─────────────────────────────────────────────────────────────────
  /organizations/{orgId}/servers:
    get:
      operationId: listServers
      tags: [servers]
      summary: List servers in organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: groupId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Server"
    post:
      operationId: createServer
      tags: [servers]
      summary: Register a server
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerInput"
      responses:
        "201":
          description: Server registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"

  /organizations/{orgId}/servers/{serverId}:
    get:
      operationId: getServer
      tags: [servers]
      summary: Get server details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
    patch:
      operationId: updateServer
      tags: [servers]
      summary: Update server
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
    delete:
      operationId: deleteServer
      tags: [servers]
      summary: Remove server
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations/{orgId}/servers/{serverId}/test-connection:
    post:
      operationId: testServerConnection
      tags: [servers]
      summary: Test SSH connection to server
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /organizations/{orgId}/servers/{serverId}/health:
    get:
      operationId: getServerHealth
      tags: [servers]
      summary: Get server health metrics
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Health metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerHealth"

  /organizations/{orgId}/servers/{serverId}/scan:
    post:
      operationId: scanServer
      tags: [servers]
      summary: AI-powered server scan (detect OS, software, ports, etc.)
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerScan"

  # ─── SERVER GROUPS ──────────────────────────────────────────────────────────
  /organizations/{orgId}/server-groups:
    get:
      operationId: listServerGroups
      tags: [server-groups]
      summary: List server groups
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServerGroup"
    post:
      operationId: createServerGroup
      tags: [server-groups]
      summary: Create server group
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerGroup"

  /organizations/{orgId}/server-groups/{groupId}:
    patch:
      operationId: updateServerGroup
      tags: [server-groups]
      summary: Update server group
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerGroupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerGroup"
    delete:
      operationId: deleteServerGroup
      tags: [server-groups]
      summary: Delete server group
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TEMPLATES ──────────────────────────────────────────────────────────────
  /organizations/{orgId}/templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List installation templates
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create installation template
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /organizations/{orgId}/templates/{templateId}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get template
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update template
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete template
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DEPLOYMENTS ────────────────────────────────────────────────────────────
  /organizations/{orgId}/deployments:
    get:
      operationId: listDeployments
      tags: [deployments]
      summary: List deployments
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: serverId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
    post:
      operationId: createDeployment
      tags: [deployments]
      summary: Create a new deployment
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /organizations/{orgId}/deployments/{deploymentId}:
    get:
      operationId: getDeployment
      tags: [deployments]
      summary: Get deployment details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: deploymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /organizations/{orgId}/deployments/{deploymentId}/approve:
    post:
      operationId: approveDeployment
      tags: [deployments]
      summary: Approve or reject a deployment plan
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: deploymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentApproval"
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /organizations/{orgId}/deployments/{deploymentId}/execute:
    post:
      operationId: executeDeployment
      tags: [deployments]
      summary: Execute an approved deployment
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: deploymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /organizations/{orgId}/deployments/{deploymentId}/rollback:
    post:
      operationId: rollbackDeployment
      tags: [deployments]
      summary: Execute rollback for a failed deployment
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: deploymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rollback started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /organizations/{orgId}/deployments/{deploymentId}/logs:
    get:
      operationId: getDeploymentLogs
      tags: [deployments]
      summary: Get deployment execution logs
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: deploymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeploymentLog"

  /organizations/{orgId}/deployments/{deploymentId}/steps:
    get:
      operationId: getDeploymentSteps
      tags: [deployments]
      summary: Get deployment steps with status
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: deploymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeploymentStep"

  /organizations/{orgId}/deployments/recent:
    get:
      operationId: getRecentDeployments
      tags: [deployments]
      summary: Get recent deployments activity feed
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recent deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"

  /organizations/{orgId}/deployments/stats:
    get:
      operationId: getDeploymentStats
      tags: [deployments]
      summary: Get deployment statistics summary
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deployment stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentStats"

  # ─── AI ASSISTANT ────────────────────────────────────────────────────────────
  /organizations/{orgId}/ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to the AI assistant
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"

  /organizations/{orgId}/ai/conversations:
    get:
      operationId: listAiConversations
      tags: [ai]
      summary: List AI conversation history
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiConversation"

  /organizations/{orgId}/ai/conversations/{conversationId}:
    get:
      operationId: getAiConversation
      tags: [ai]
      summary: Get conversation with messages
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversationDetail"
    delete:
      operationId: deleteAiConversation
      tags: [ai]
      summary: Delete conversation
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations/{orgId}/ai/analyze-deployment:
    post:
      operationId: analyzeDeployment
      tags: [ai]
      summary: AI generates a deployment plan for a server + template
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentAnalysisInput"
      responses:
        "200":
          description: AI deployment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentPlan"

  /organizations/{orgId}/ai/troubleshoot:
    post:
      operationId: troubleshoot
      tags: [ai]
      summary: AI analyzes logs and suggests fixes
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TroubleshootInput"
      responses:
        "200":
          description: Troubleshooting analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TroubleshootResult"

  # ─── MONITORING ──────────────────────────────────────────────────────────────
  /organizations/{orgId}/monitoring/overview:
    get:
      operationId: getMonitoringOverview
      tags: [monitoring]
      summary: Get monitoring overview for all servers
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringOverview"

  /organizations/{orgId}/monitoring/servers/{serverId}/metrics:
    get:
      operationId: getServerMetrics
      tags: [monitoring]
      summary: Get server time-series metrics
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: serverId
          in: path
          required: true
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d]
            default: 1h
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerMetrics"

  /organizations/{orgId}/monitoring/alerts:
    get:
      operationId: listAlerts
      tags: [monitoring]
      summary: List active monitoring alerts
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: severity
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonitoringAlert"

  # ─── AUDIT LOGS ──────────────────────────────────────────────────────────────
  /organizations/{orgId}/audit-logs:
    get:
      operationId: listAuditLogs
