      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"

  # ─── DOCUMENTATION ───────────────────────────────────────────────────────────
  /organizations/{orgId}/documents:
    get:
      operationId: listDocuments
      tags: [documentation]
      summary: List generated documents
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: generateDocument
      tags: [documentation]
      summary: Generate a document (AI-powered)
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentGenerationInput"
      responses:
        "201":
          description: Generated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /organizations/{orgId}/documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documentation]
      summary: Get document
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documentation]
      summary: Delete document
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── REPORTS ─────────────────────────────────────────────────────────────────
  /organizations/{orgId}/reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List generated reports
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: generateReport
      tags: [reports]
      summary: Generate a report
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  # ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── AUTH ──────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string

        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string

        password:
          type: string

    PasswordChangeInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── ORGANIZATIONS ─────────────────────────────────────────────────────────
    OrganizationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        logoUrl:
          type: string

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        logoUrl:
          type: string

    Organization:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        serverCount:
          type: integer

    OrgStats:
      type: object
      required: [totalServers, onlineServers, activeDeployments, failedDeployments, totalDeployments, pendingApprovals, alertCount]
      properties:
        totalServers:
          type: integer
        onlineServers:
          type: integer
        offlineServers:
          type: integer
        activeDeployments:
          type: integer
        failedDeployments:
          type: integer
        totalDeployments:
          type: integer
        pendingApprovals:
          type: integer
        alertCount:
          type: integer
        successRate:
          type: number

    OrgMemberInput:
      type: object
      required: [email, role]
      properties:
        email:
          type: string

        role:
          type: string
          enum: [engineer, reviewer, admin]

    OrgMemberUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [engineer, reviewer, admin]

    OrgMember:
      type: object
      required: [userId, name, email, role, joinedAt]
      properties:
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [engineer, reviewer, admin]
        joinedAt:
          type: string
          format: date-time

    # ─── SERVERS ───────────────────────────────────────────────────────────────
    ServerInput:
      type: object
      required: [name, host, sshPort, sshUsername, os]
      properties:
        name:
          type: string
        host:
          type: string
        sshPort:
          type: integer
          default: 22
        sshUsername:
          type: string
        sshKeyId:
          type: ["integer", "null"]
        os:
          type: string
          enum: [ubuntu, debian, rhel, centos, windows, other]
        osVersion:
          type: string
        groupId:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string
        description:
          type: string

    ServerUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        groupId:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string

    Server:
      type: object
      required: [id, name, host, sshPort, sshUsername, os, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        host:
          type: string
        sshPort:
          type: integer
        sshUsername:
          type: string
        os:
          type: string
        osVersion:
          type: ["string", "null"]
        status:
          type: string
          enum: [online, offline, unknown, maintenance]
        groupId:
          type: ["integer", "null"]
        groupName:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        lastSeen:
          type: ["string", "null"]
          format: date-time
        cpuUsage:
          type: ["number", "null"]
        memUsage:
          type: ["number", "null"]
        diskUsage:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time

    ConnectionTestResult:
      type: object
      required: [success, message, latencyMs]
      properties:
        success:
          type: boolean
        message:
          type: string
        latencyMs:
          type: ["integer", "null"]

    ServerHealth:
      type: object
      required: [serverId, timestamp]
      properties:
        serverId:
          type: integer
        timestamp:
          type: string
          format: date-time
        cpuUsage:
          type: number
        memoryUsage:
          type: number
        memoryTotal:
          type: integer
        memoryUsed:
          type: integer
        diskUsage:
          type: number
        diskTotal:
          type: integer
        diskUsed:
          type: integer
        networkIn:
          type: number
        networkOut:
          type: number
        loadAverage:
          type: array
          items:
            type: number
        uptime:
          type: integer
        runningProcesses:
          type: integer
        runningServices:
          type: array
          items:
            type: string
        openPorts:
          type: array
          items:
            type: integer

    ServerScan:
      type: object
      required: [serverId, scannedAt, os, packages, services, ports, dockerInstalled, kubernetesInstalled]
      properties:
        serverId:
          type: integer
        scannedAt:
          type: string
          format: date-time
        os:
          type: string
        osVersion:
          type: string
        kernel:
          type: string
        cpuModel:
          type: string
        cpuCores:
          type: integer
        totalMemoryMb:
          type: integer
        totalDiskGb:
          type: integer
        packages:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
        ports:
          type: array
          items:
            type: integer
        dockerInstalled:
          type: boolean
        kubernetesInstalled:
          type: boolean
        firewallEnabled:
          type: boolean
        sslCertificates:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              expiresAt:
                type: string

    ServerGroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    ServerGroupUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    ServerGroup:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        serverCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    # ─── TEMPLATES ─────────────────────────────────────────────────────────────
    TemplateInput:
      type: object
      required: [name, category, software, version]
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [webserver, database, container, language, messaging, security, monitoring, other]
        software:
          type: string
        version:
          type: string
        osRequirements:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/TemplateStep"
        configValues:
          type: object
          additionalProperties: true
        envVars:
          type: object
          additionalProperties: true
        postInstallActions:
          type: array
          items:
            type: string

    TemplateUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/TemplateStep"
        configValues:
          type: object
          additionalProperties: true
        envVars:
          type: object
          additionalProperties: true
        postInstallActions:
          type: array
          items:
            type: string

    TemplateStep:
      type: object
      required: [order, name, command]
      properties:
        order:
          type: integer
        name:
          type: string
        description:
          type: string
        command:
          type: string
        expectedOutput:
          type: string
        continueOnError:
          type: boolean
        estimatedSeconds:
          type: integer

    Template:
      type: object
      required: [id, name, category, software, version, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        software:
          type: string
        version:
          type: string
        osRequirements:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/TemplateStep"
        configValues:
          type: object
          additionalProperties: true
        envVars:
          type: object
          additionalProperties: true
        postInstallActions:
          type: array
          items:
            type: string
        isBuiltIn:
          type: boolean
        usageCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    # ─── DEPLOYMENTS ───────────────────────────────────────────────────────────
    DeploymentInput:
      type: object
      required: [serverId, templateId, name]
      properties:
        serverId:
          type: integer
        templateId:
          type: integer
        name:
          type: string
        description:
          type: string
        configOverrides:
          type: object
          additionalProperties: true
        scheduledAt:
          type: ["string", "null"]
          format: date-time

    DeploymentApproval:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        comment:
          type: string

    Deployment:
      type: object
      required: [id, name, status, serverId, templateId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, planning, planned, awaiting_approval, approved, rejected, running, completed, failed, rolling_back, rolled_back]
        serverId:
          type: integer
        serverName:
          type: string
        serverHost:
          type: string
        templateId:
          type: integer
        templateName:
          type: string
        templateSoftware:
          type: string
        createdById:
          type: integer
        createdByName:
          type: string
        approvedById:
          type: ["integer", "null"]
        approvedByName:
          type: ["string", "null"]
        approvalComment:
          type: ["string", "null"]
        plan:
          $ref: "#/components/schemas/DeploymentPlan"
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        duration:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    DeploymentPlan:
      type: object
      required: [summary, steps, risks, estimatedDuration, rollbackStrategy]
      properties:
        summary:
          type: string
        whyRequired:
          type: string
        benefits:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            $ref: "#/components/schemas/RiskItem"
        dependencies:
          type: array
          items:
            type: string
        estimatedDuration:
          type: integer
        estimatedDowntime:
          type: integer
        requiredPorts:
          type: array
          items:
            type: integer
        requiredPackages:
          type: array
          items:
            type: string
        backupRecommendations:
          type: array
          items:
            type: string
        rollbackStrategy:
          type: string
        expectedOutcome:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/PlanStep"

    RiskItem:
      type: object
      required: [description, severity]
      properties:
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        mitigation:
          type: string

    PlanStep:
      type: object
      required: [order, name, description, command, estimatedSeconds]
      properties:
        order:
          type: integer
        name:
          type: string
        description:
          type: string
        command:
          type: string
        whyRequired:
          type: string
        estimatedSeconds:
          type: integer
        rollbackCommand:
          type: string

    DeploymentLog:
      type: object
      required: [id, deploymentId, timestamp, level, message]
      properties:
        id:
          type: integer
        deploymentId:
          type: integer
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, warn, error, success, debug]
        message:
          type: string
        stepName:
          type: ["string", "null"]
        output:
          type: ["string", "null"]

    DeploymentStep:
      type: object
      required: [id, deploymentId, order, name, status]
      properties:
        id:
          type: integer
        deploymentId:
          type: integer
        order:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        command:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
        output:
          type: ["string", "null"]
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        duration:
          type: ["integer", "null"]

    DeploymentStats:
      type: object
      required: [total, completed, failed, running, successRate]
      properties:
        total:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        running:
          type: integer
        rolledBack:
          type: integer
        successRate:
          type: number
        avgDuration:
          type: number
        byStatus:
          type: object
          additionalProperties: true
        byDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer
              failed:
                type: integer

    # ─── AI ────────────────────────────────────────────────────────────────────
    AiChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        conversationId:
          type: ["integer", "null"]
        contextServerId:
          type: ["integer", "null"]
        contextDeploymentId:
          type: ["integer", "null"]

    ChatResult:
      type: object
      required: [message, conversationId]
      properties:
        message:
          type: string
        conversationId:
          type: integer
        reasoning:
          type: ["string", "null"]
        recommendations:
          type: array
          items:
            type: string
        codeBlocks:
          type: array
          items:
            type: object
            properties:
              language:
                type: string
              code:
                type: string

    AiConversation:
      type: object
      required: [id, title, messageCount, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        messageCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    AiConversationDetail:
      type: object
      required: [id, title, messages, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AiMessage"
        createdAt:
          type: string
          format: date-time

    AiMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    DeploymentAnalysisInput:
      type: object
      required: [serverId, templateId]
      properties:
        serverId:
          type: integer
        templateId:
          type: integer
        configOverrides:
          type: object
          additionalProperties: true

    TroubleshootInput:
      type: object
      required: [serverId, description]
      properties:
        serverId:
          type: integer
        deploymentId:
          type: ["integer", "null"]
        description:
          type: string
        logs:
          type: string

    TroubleshootResult:
      type: object
      required: [rootCause, explanation, recommendations]
      properties:
        rootCause:
          type: string
        explanation:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        recommendations:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
              command:
                type: string
              explanation:
                type: string

    # ─── MONITORING ────────────────────────────────────────────────────────────
    MonitoringOverview:
      type: object
      required: [servers, alerts]
      properties:
        servers:
          type: array
          items:
            $ref: "#/components/schemas/ServerStatusSummary"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/MonitoringAlert"
        totalOnline:
          type: integer
        totalOffline:
          type: integer
        avgCpuUsage:
          type: number
        avgMemUsage:
          type: number

    ServerStatusSummary:
      type: object
      required: [serverId, name, host, status]
      properties:
        serverId:
          type: integer
        name:
          type: string
        host:
          type: string
        status:
          type: string
        cpuUsage:
          type: ["number", "null"]
        memUsage:
          type: ["number", "null"]
        diskUsage:
          type: ["number", "null"]
        uptime:
          type: ["integer", "null"]
        alertCount:
          type: integer

    ServerMetrics:
      type: object
      required: [serverId, period, dataPoints]
      properties:
        serverId:
          type: integer
        period:
          type: string
        dataPoints:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
              cpuUsage:
                type: number
              memUsage:
                type: number
              diskUsage:
                type: number
              networkIn:
                type: number
              networkOut:
                type: number

    MonitoringAlert:
      type: object
      required: [id, serverId, serverName, type, severity, message, triggeredAt]
      properties:
        id:
          type: integer
        serverId:
          type: integer
        serverName:
          type: string
        type:
          type: string
          enum: [cpu_high, memory_high, disk_high, service_down, ssl_expiring, unreachable, custom]
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string
        resolved:
          type: boolean
        triggeredAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time

    # ─── AUDIT LOGS ────────────────────────────────────────────────────────────
    AuditLog:
      type: object
      required: [id, action, userId, userName, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
        userId:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        resourceType:
          type: ["string", "null"]
        resourceId:
          type: ["integer", "null"]
        resourceName:
          type: ["string", "null"]
        details:
          type: object
          additionalProperties: true
        ipAddress:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AuditLogPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ─── DOCUMENTATION ─────────────────────────────────────────────────────────
    DocumentGenerationInput:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [deployment_report, installation_report, architecture_doc, sop, rollback_doc, troubleshooting_report, audit_summary]
        title:
          type: string
        deploymentId:
          type: ["integer", "null"]
        serverId:
          type: ["integer", "null"]
        prompt:
          type: string

    Document:
      type: object
      required: [id, type, title, content, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        content:
          type: string
        format:
          type: string
          enum: [markdown, html, text]
        relatedDeploymentId:
          type: ["integer", "null"]
        relatedServerId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── REPORTS ───────────────────────────────────────────────────────────────
    ReportInput:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [deployment_summary, server_health, audit_report, compliance_report]
        title:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        serverId:
          type: ["integer", "null"]

    Report:
      type: object
      required: [id, type, title, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        summary:
          type: string
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    # ─── NOTIFICATIONS ─────────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, type, title, read, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deployment_started, deployment_completed, deployment_failed, approval_required, server_alert, system]
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        link:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
