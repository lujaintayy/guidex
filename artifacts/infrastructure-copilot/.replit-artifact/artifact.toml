kind = "web"
previewPath = "/"
title = "Infrastructure Copilot"
version = "1.0.0"
id = "artifacts/infrastructure-copilot"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25842

[services.development]
run = "pnpm --filter @workspace/infrastructure-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/infrastructure-copilot", "run", "build" ]
serve = "static"
publicDir = "artifacts/infrastructure-copilot/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25842"
BASE_PATH = "/"
